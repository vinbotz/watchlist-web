<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Movie Watchlist</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  </head>

  <div id="popup" class="popup">
    <div class="popup-box">
      <p id="popupMessage"></p>
      <button onclick="closePopup()">OK</button>
    </div>
  </div>

  <div id="deleteModal" class="popup">
    <div class="popup-box">
      <p>Hapus film ini dari watchlist?</p>

      <div class="popup-buttons">
        <button id="confirmDelete">Hapus</button>

        <button onclick="closeDeleteModal()" class="cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <body>
    <button id="hamburgerBtn" class="hamburger-btn" aria-label="Menu">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <div id="menuOverlay" class="menu-overlay"></div>
    <nav id="menuPanel" class="menu-panel">
      <button id="closeMenuBtn" class="close-menu-btn" aria-label="Tutup menu">
        ×
      </button>
      <ul class="menu-list">
        <li><a href="#" data-section="header">🔍 Cari Film</a></li>
        <li><a href="#" data-section="searchResult">📋 Hasil Pencarian</a></li>
        <li><a href="#" data-section="trailerSection">🎬 Trailer</a></li>
        <li><a href="#" data-section="watchlist">📽️ My Watchlist</a></li>
        <li><a href="#" data-action="random">🎲 Rekomendasi Acak</a></li>
      </ul>
    </nav>

    <header id="header">
      <div class="header-content">
        <h1>🎬 My Movie Watchlist</h1>
        <div class="search-box">
          <input id="movieInput" placeholder="Cari film..." />
          <button onclick="searchMovie()">Search</button>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="section" id="searchResult">
        <h2 class="section-title">Search Result</h2>
        <div id="results" class="section-body"></div>
      </section>

      <section class="section" id="trailerSection">
        <h2 class="section-title">Trailer</h2>
        <div id="trailer" class="section-body"></div>
      </section>

      <section class="section" id="watchlist">
        <h2 class="section-title">My Watchlist</h2>
        <div id="movies" class="section-body"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
